<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papyrates Database</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f3fa;min-height:100vh}
.app{max-width:700px;margin:0 auto;padding:0 0 2rem}
.header{background:#2d4a8a;color:white;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-radius:0 0 0 0}
.header h1{font-size:18px;font-weight:500}
.header .count{font-size:13px;opacity:0.85}
.filters{background:#3a5ba0;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.filter-row{display:flex;gap:8px;align-items:center}
.filter-label{color:rgba(255,255,255,0.9);font-size:13px;min-width:80px;flex-shrink:0}
.filter-select{flex:1;padding:7px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);color:white;font-size:13px;cursor:pointer}
.filter-select option{background:#2d4a8a;color:white}
.filter-input{flex:1;padding:7px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);color:white;font-size:13px}
.filter-input::placeholder{color:rgba(255,255,255,0.6)}
.swap-btn{background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.4);padding:7px 12px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap}
.swap-btn:hover{background:rgba(255,255,255,0.3)}
.date-input{flex:1;padding:7px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.15);color:white;font-size:13px}
.date-input::-webkit-calendar-picker-indicator{filter:invert(1)}
.clear-btn{background:rgba(255,100,100,0.3);color:white;border:1px solid rgba(255,100,100,0.5);padding:7px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.clear-btn:hover{background:rgba(255,100,100,0.4)}
.results-header{background:#e8ecf5;padding:10px 16px;border-bottom:1px solid #d0d8ec}
.results-count{font-size:13px;color:#3a5ba0;font-weight:500}
.col-headers{display:grid;grid-template-columns:1fr 1fr 100px 24px;padding:8px 16px;background:#f0f3fa;border-bottom:1px solid #d0d8ec;font-size:12px;color:#3a5ba0;font-weight:bold}
.letter-row{display:grid;grid-template-columns:1fr 1fr 100px 24px;padding:12px 16px;border-bottom:1px solid #e8e8e8;cursor:pointer;align-items:center;background:white}
.letter-row:hover{background:#f5f7fc}
.letter-name{font-size:13px;color:#222;line-height:1.3}
.letter-date{font-size:12px;color:#666}
.arrow{color:#3a5ba0;font-size:16px;text-align:right}
.loading{padding:2rem;text-align:center;color:#666;font-size:14px;background:white}
.no-results{padding:2rem;text-align:center;color:#666;font-size:14px;background:white}
.detail-header{background:#2d4a8a;color:white;padding:14px 16px;display:flex;align-items:center;gap:12px}
.back-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:white;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:13px}
.back-btn:hover{background:rgba(255,255,255,0.3)}
.detail-body{padding:16px;background:white}
.field-label{font-size:11px;color:#3a5ba0;font-weight:bold;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.field-value{font-size:14px;color:#222;line-height:1.6;margin-bottom:14px}
.field-empty{font-size:14px;color:#999;font-style:italic;margin-bottom:14px}
.divider{height:1px;background:#e8e8e8;margin:12px 0}
.pdf-btn{display:inline-flex;align-items:center;gap:6px;background:#3a5ba0;color:white;padding:8px 14px;border-radius:6px;text-decoration:none;font-size:13px}
.pdf-btn:hover{background:#2d4a8a}
.no-pdf{display:inline-flex;align-items:center;gap:6px;background:#f0f0f0;color:#888;padding:8px 14px;border-radius:6px;font-size:13px}
.fulltext-toggle{background:none;border:1px solid #3a5ba0;color:#3a5ba0;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;margin-bottom:8px}
.fulltext-toggle:hover{background:#e8ecf5}
.fulltext-content{font-size:12px;color:#555;line-height:1.7;background:#f8f8f8;padding:12px;border-radius:6px;border:1px solid #e0e0e0;white-space:pre-wrap;max-height:300px;overflow-y:auto}
.pagination{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 16px;border-top:1px solid #e0e0e0;background:white}
.page-btn{background:none;border:1px solid #3a5ba0;color:#3a5ba0;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px}
.page-btn:disabled{opacity:0.4;cursor:default}
.page-btn:not(:disabled):hover{background:#e8ecf5}
.page-info{font-size:13px;color:#666}
.login-screen{max-width:360px;margin:80px auto;background:white;border-radius:12px;padding:32px;box-shadow:0 2px 20px rgba(0,0,0,0.1);text-align:center}
.login-screen h1{color:#2d4a8a;font-size:22px;margin-bottom:8px}
.login-screen p{color:#666;font-size:14px;margin-bottom:24px}
.login-input{width:100%;padding:10px 14px;border:1px solid #d0d8ec;border-radius:6px;font-size:14px;margin-bottom:12px}
.login-btn{width:100%;padding:10px;background:#2d4a8a;color:white;border:none;border-radius:6px;font-size:15px;cursor:pointer}
.login-btn:hover{background:#3a5ba0}
.login-error{color:#c0392b;font-size:13px;margin-top:8px}
</style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <h1>🏴‍☠️ Papyrates</h1>
  <p>Enter the password to access the database</p>
  <input type="password" class="login-input" id="pwd-input" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="login-btn" onclick="doLogin()">Enter</button>
  <div class="login-error" id="login-error"></div>
</div>

<div id="main-app" style="display:none">
  <div class="app" id="app">
    <div class="loading">Connecting to Papyrates Database...</div>
  </div>
</div>

<script>
const APP_PASSWORD = "papyrates2024";

function doLogin(){
  const val = document.getElementById("pwd-input").value;
  if(val === APP_PASSWORD){
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-app").style.display = "block";
    init();
  } else {
    document.getElementById("login-error").textContent = "Incorrect password. Please try again.";
  }
}

const SURL = "https://vzfwobsnfqnnqvnsfksq.supabase.co/rest/v1";
const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6ZndvYnNuZnFubnF2bnNma3NxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Njg4ODA3MCwiZXhwIjoyMDkyNDY0MDcwfQ.J_TE4qWj9r6TIvGeptM58r2WtI6ytOe9zg7BBe29wHI";
const SH = {"apikey":SKEY,"Authorization":"Bearer "+SKEY};

let people = {};
let authorOpts = [];
let recipOpts = [];
let state = {
  view:"list", authorId:"", recipientId:"",
  dateFrom:"", dateTo:"", language:"", descSearch:"", textSearch:"",
  letters:[], totalCount:0, filteredCount:0, page:0, pageSize:50,
  loading:true, selected:null, showFT:false
};

async function sq(path){
  try{
    const r = await fetch(SURL+"/"+path,{headers:SH});
    if(!r.ok){ console.error("API error",r.status); return []; }
    return await r.json();
  }catch(e){ console.error("Fetch error",e); return []; }
}

async function sqCount(path){
  try{
    const r = await fetch(SURL+"/"+path,{headers:{...SH,"Prefer":"count=exact"}});
    const ct = r.headers.get("content-range");
    if(ct){ const m=ct.match(/\/(\d+)/); if(m) return parseInt(m[1]); }
    return 0;
  }catch(e){ return 0; }
}

function pname(id){
  if(!id) return "";
  const p = people[String(id)];
  if(!p) return "";
  const l = (p.last_name||"").trim();
  const f = (p.first_name||"").trim();
  if(!l && !f) return "Unknown";
  if(!l) return f;
  if(!f) return l;
  return l+", "+f;
}

function fdate(d){
  if(!d) return "";
  const p = d.split("-");
  if(p.length!==3) return d;
  return parseInt(p[1])+"/"+parseInt(p[2])+"/"+p[0];
}

async function loadPeople(){
  let all=[], offset=0;
  while(true){
    const batch = await sq("people?select=id,first_name,last_name&order=last_name.asc&limit=1000&offset="+offset);
    if(!Array.isArray(batch)||batch.length===0) break;
    all = all.concat(batch);
    if(batch.length<1000) break;
    offset+=1000;
  }
  all.forEach(p=>{ people[String(p.id)]=p; });
}

async function buildAuthorOpts(){
  let ids;
  if(state.recipientId){
    const rows = await sq("letters?recipient_id=eq."+state.recipientId+"&select=author_id&limit=5000");
    ids=[...new Set((rows||[]).map(r=>String(r.author_id)).filter(Boolean))];
  } else {
    const rows = await sq("letters?select=author_id&limit=5000");
    ids=[...new Set((rows||[]).map(r=>String(r.author_id)).filter(Boolean))];
  }
  authorOpts = ids.map(id=>({id,name:pname(id)})).filter(x=>x.name).sort((a,b)=>a.name.localeCompare(b.name));
}

async function buildRecipOpts(){
  let ids;
  if(state.authorId){
    const rows = await sq("letters?author_id=eq."+state.authorId+"&select=recipient_id&limit=5000");
    ids=[...new Set((rows||[]).map(r=>String(r.recipient_id)).filter(Boolean))];
  } else {
    const rows = await sq("letters?select=recipient_id&limit=5000");
    ids=[...new Set((rows||[]).map(r=>String(r.recipient_id)).filter(Boolean))];
  }
  recipOpts = ids.map(id=>({id,name:pname(id)})).filter(x=>x.name).sort((a,b)=>a.name.localeCompare(b.name));
}

function buildQ(){
  let q="letters?select=id,author_id,recipient_id,date_of_letter,description,translation,language,full_text,sharing_link,title";
  const f=[];
  if(state.authorId) f.push("author_id=eq."+state.authorId);
  if(state.recipientId) f.push("recipient_id=eq."+state.recipientId);
  if(state.dateFrom) f.push("date_of_letter=gte."+state.dateFrom);
  if(state.dateTo) f.push("date_of_letter=lte."+state.dateTo);
  if(state.language) f.push("language=eq."+encodeURIComponent(state.language));
  if(state.descSearch) f.push("description=ilike.*"+encodeURIComponent(state.descSearch)+"*");
  if(state.textSearch) f.push("full_text=ilike.*"+encodeURIComponent(state.textSearch)+"*");
  if(f.length) q+="&"+f.join("&");
  q+="&order=date_of_letter.asc.nullslast&offset="+(state.page*state.pageSize)+"&limit="+state.pageSize;
  return q;
}

function buildCountQ(){
  let q="letters?select=id";
  const f=[];
  if(state.authorId) f.push("author_id=eq."+state.authorId);
  if(state.recipientId) f.push("recipient_id=eq."+state.recipientId);
  if(state.dateFrom) f.push("date_of_letter=gte."+state.dateFrom);
  if(state.dateTo) f.push("date_of_letter=lte."+state.dateTo);
  if(state.language) f.push("language=eq."+encodeURIComponent(state.language));
  if(state.descSearch) f.push("description=ilike.*"+encodeURIComponent(state.descSearch)+"*");
  if(state.textSearch) f.push("full_text=ilike.*"+encodeURIComponent(state.textSearch)+"*");
  if(f.length) q+="&"+f.join("&");
  return q;
}

async function loadLetters(){
  state.loading=true; render();
  const [rows, count] = await Promise.all([sq(buildQ()), sqCount(buildCountQ())]);
  state.letters = Array.isArray(rows)?rows:[];
  state.filteredCount = count;
  state.loading=false; render();
}

async function init(){
  await loadPeople();
  state.totalCount = await sqCount("letters?select=id");
  state.filteredCount = state.totalCount;
  render();
  await Promise.all([buildAuthorOpts(), buildRecipOpts()]);
  await loadLetters();
}

async function onAuthor(v){
  state.authorId=v; state.page=0;
  await buildRecipOpts(); render(); loadLetters();
}
async function onRecip(v){
  state.recipientId=v; state.page=0;
  await buildAuthorOpts(); render(); loadLetters();
}
function onFilter(k,v){ state[k]=v; state.page=0; loadLetters(); }
let st;
function onSearch(k,v){ state[k]=v; clearTimeout(st); st=setTimeout(()=>{state.page=0;loadLetters();},600); }
async function doSwap(){
  const a=state.authorId,r=state.recipientId;
  state.authorId=r; state.recipientId=a; state.page=0;
  await Promise.all([buildAuthorOpts(),buildRecipOpts()]);
  loadLetters();
}
async function doClear(){
  state.authorId="";state.recipientId="";state.dateFrom="";state.dateTo="";
  state.language="";state.descSearch="";state.textSearch="";state.page=0;
  await Promise.all([buildAuthorOpts(),buildRecipOpts()]);
  loadLetters();
}
function openLetter(idx){ state.selected=state.letters[idx]; state.showFT=false; state.view="detail"; render(); }
function goBack(){ state.view="list"; render(); }
function toggleFT(){ state.showFT=!state.showFT; render(); }
function changePage(d){ state.page+=d; loadLetters(); }

const LANGS=["English","French","German","Latin","Italian","Spanish","Coptic","Greek","Arabic","Dutch","Hebrew"];

function renderList(){
  return `
  <div class="header">
    <h1>🏴‍☠️ Papyrates Database</h1>
    <span class="count">${state.totalCount>0?state.totalCount.toLocaleString():"..."} letters total</span>
  </div>
  <div class="filters">
    <div class="filter-row">
      <span class="filter-label">Author:</span>
      <select class="filter-select" onchange="onAuthor(this.value)">
        <option value="">— All authors —</option>
        ${authorOpts.map(p=>`<option value="${p.id}"${state.authorId==p.id?" selected":""}>${p.name}</option>`).join("")}
      </select>
      <button class="swap-btn" onclick="doSwap()">⇄ Swap</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">Recipient:</span>
      <select class="filter-select" onchange="onRecip(this.value)">
        <option value="">— All recipients —</option>
        ${recipOpts.map(p=>`<option value="${p.id}"${state.recipientId==p.id?" selected":""}>${p.name}</option>`).join("")}
      </select>
    </div>
    <div class="filter-row">
      <span class="filter-label">Language:</span>
      <select class="filter-select" onchange="onFilter('language',this.value)">
        <option value="">— Any —</option>
        ${LANGS.map(l=>`<option value="${l}"${state.language===l?" selected":""}>${l}</option>`).join("")}
      </select>
    </div>
    <div class="filter-row">
      <span class="filter-label">Date from:</span>
      <input type="date" class="date-input" value="${state.dateFrom}" onchange="onFilter('dateFrom',this.value)">
      <span style="color:rgba(255,255,255,0.7);font-size:12px;flex-shrink:0">to</span>
      <input type="date" class="date-input" value="${state.dateTo}" onchange="onFilter('dateTo',this.value)">
    </div>
    <div class="filter-row">
      <span class="filter-label">Description:</span>
      <input class="filter-input" placeholder="Search descriptions..." value="${state.descSearch}" oninput="onSearch('descSearch',this.value)">
    </div>
    <div class="filter-row">
      <span class="filter-label">Full text:</span>
      <input class="filter-input" placeholder="Search OCR text..." value="${state.textSearch}" oninput="onSearch('textSearch',this.value)">
      <button class="clear-btn" onclick="doClear()">Clear all</button>
    </div>
  </div>
  <div class="results-header">
    <span class="results-count">${state.loading?"Searching...":(state.filteredCount.toLocaleString()+" results")}</span>
  </div>
  ${state.loading?`<div class="loading">Loading...</div>`:renderRows()}`;
}

function renderRows(){
  if(!state.letters.length) return `<div class="no-results">No letters found matching your filters.</div>`;
  const totalPages=Math.ceil(state.filteredCount/state.pageSize)||1;
  return `
    <div class="col-headers"><span>Author</span><span>Recipient</span><span>Date</span><span></span></div>
    ${state.letters.map((l,i)=>`
      <div class="letter-row" onclick="openLetter(${i})">
        <span class="letter-name">${pname(l.author_id)||l.title||"—"}</span>
        <span class="letter-name">${pname(l.recipient_id)||"—"}</span>
        <span class="letter-date">${fdate(l.date_of_letter)||"—"}</span>
        <span class="arrow">›</span>
      </div>`).join("")}
    <div class="pagination">
      <button class="page-btn" onclick="changePage(-1)" ${state.page===0?"disabled":""}>← Prev</button>
      <span class="page-info">Page ${state.page+1} of ${totalPages}</span>
      <button class="page-btn" onclick="changePage(1)" ${(state.page+1)*state.pageSize>=state.filteredCount?"disabled":""}>Next →</button>
    </div>`;
}

function renderDetail(){
  const l=state.selected;
  if(!l) return "";
  const hasPdf=l.sharing_link&&l.sharing_link.trim();
  return `
  <div class="detail-header">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <span style="font-size:16px;font-weight:500">Letter Detail</span>
  </div>
  <div class="detail-body">
    <div class="field-label">Author</div>
    <div class="field-value">${pname(l.author_id)||l.title||"Unknown"}</div>
    <div class="field-label">Recipient</div>
    <div class="field-value">${pname(l.recipient_id)||"<span class='field-empty'>Unknown</span>"}</div>
    <div class="field-label">Date of Letter</div>
    <div class="field-value">${fdate(l.date_of_letter)||"<span class='field-empty'>Unknown</span>"}</div>
    <div class="divider"></div>
    <div class="field-label">Description</div>
    <div class="field-value">${l.description||"<span class='field-empty'>No description available</span>"}</div>
    ${l.translation?`<div class="field-label">Translation</div><div class="field-value">${l.translation}</div>`:""}
    ${l.language?`<div class="field-label">Language of Letter</div><div class="field-value">${l.language}</div>`:""}
    <div class="divider"></div>
    <div class="field-label">Original Document</div>
    <div class="field-value">
      ${hasPdf?`<a class="pdf-btn" href="${l.sharing_link}" target="_blank">📄 View Original PDF</a>`:`<span class="no-pdf">📄 No PDF available</span>`}
    </div>
    ${l.full_text?`
    <div class="divider"></div>
    <div class="field-label">OCR Full Text</div>
    <button class="fulltext-toggle" onclick="toggleFT()">${state.showFT?"▲ Hide text":"▼ Show OCR text"}</button>
    ${state.showFT?`<div class="fulltext-content">${l.full_text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>`:""}
    `:""}
  </div>`;
}

function render(){
  const app=document.getElementById("app");
  if(!app) return;
  app.innerHTML=state.view==="detail"?renderDetail():renderList();
}

render();
</script>
</body>
</html>
