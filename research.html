<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papyrates Research Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#1a1a2e;min-height:100vh;display:flex;flex-direction:column}
.header{background:#2d4a8a;color:white;padding:16px 24px;display:flex;align-items:center;gap:12px}
.header h1{font-size:20px;font-weight:500}
.header p{font-size:13px;opacity:0.8;margin-top:2px}
.chat-container{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;max-width:900px;width:100%;margin:0 auto}
.message{padding:16px;border-radius:10px;line-height:1.7;font-size:14px}
.message.user{background:#2d4a8a;color:white;align-self:flex-end;max-width:80%}
.message.assistant{background:white;color:#222;align-self:flex-start;max-width:90%;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.message.system{background:#1e3a5f;color:#aac4e8;align-self:center;font-size:12px;padding:8px 16px;border-radius:20px;text-align:center}
.message h3{color:#2d4a8a;margin-bottom:8px;font-size:15px}
.sources{margin-top:12px;padding-top:12px;border-top:1px solid #e0e0e0;font-size:12px;color:#666}
.source-item{background:#f0f3fa;padding:6px 10px;border-radius:4px;margin-top:6px}
.input-area{background:#16213e;padding:16px 24px;border-top:1px solid #2d4a8a}
.input-row{max-width:900px;margin:0 auto;display:flex;gap:12px;align-items:flex-end}
.input-row textarea{flex:1;padding:12px;border-radius:8px;border:1px solid #2d4a8a;background:#1a1a2e;color:white;font-size:14px;resize:none;min-height:60px;max-height:200px;font-family:Arial,sans-serif}
.input-row textarea::placeholder{color:#556}
.input-row textarea:focus{outline:none;border-color:#5a8ad4}
.send-btn{background:#2d4a8a;color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:14px;white-space:nowrap;height:48px}
.send-btn:hover{background:#3a5ba0}
.send-btn:disabled{opacity:0.5;cursor:default}
.thinking{display:flex;gap:6px;align-items:center;padding:16px;background:white;border-radius:10px;align-self:flex-start;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.dot{width:8px;height:8px;background:#2d4a8a;border-radius:50%;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.settings{background:#16213e;padding:8px 24px;border-bottom:1px solid #2d4a8a;display:flex;gap:16px;align-items:center;font-size:12px;color:#aaa;flex-wrap:wrap}
.settings label{display:flex;align-items:center;gap:6px;cursor:pointer}
.counter{margin-left:auto;color:#556}
.dss-badge{background:#4a1a6e;color:#d4a8ff;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:8px}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>&#x1F3F4;&#x200D;&#x2620;&#xFE0F; Papyrates Research Assistant</h1>
    <p>AI-powered analysis of the papyri correspondence database</p>
  </div>
</div>
<div class="settings">
  <label><input type="checkbox" id="useDB" checked> Search database letters</label>
  <label><input type="checkbox" id="useWeb" checked> Include scholarly context</label>
  <span id="letterCount" class="counter">Loading...</span>
</div>
<div class="chat-container" id="chat">
  <div class="message system">Ask a research question. I will search the correspondence database and synthesize an answer.<br>I have specialized knowledge of Dead Sea Scroll manuscripts, dealers, and provenance issues.</div>
</div>
<div class="input-area">
  <div class="input-row">
    <textarea id="questionInput" placeholder="Ask a research question... (e.g. 'What do the letters reveal about post-2002 Dead Sea Scroll fragments?')" rows="2"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendQuestion()">Ask</button>
  </div>
</div>
<script>
var SUPABASE_URL="https://vzfwobsnfqnnqvnsfksq.supabase.co/rest/v1";
var SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6ZndvYnNuZnFubnF2bnNma3NxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Njg4ODA3MCwiZXhwIjoyMDkyNDY0MDcwfQ.J_TE4qWj9r6TIvGeptM58r2WtI6ytOe9zg7BBe29wHI";
var SH={"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY};

var DSS_TRIGGERS=["dead sea","dss","qumran","cave 4","cave 11","judean desert","wadi murabba","nahal hever","museum of the bible","motb","green collection","hobby lobby","post-2002","post 2002","unprovenanced","forgery","forgeries","kando","ferrini","schoyen","fragment"];

var ALL_DSS_TERMS=["dead sea","scroll","qumran","fragment","kando","william kando","ferrini","schøyen","schoyen","museum of the bible","hobby lobby","green collection","azusa pacific","lanier","cave 4","cave 11","wadi","judean desert","nahal hever","ketef jericho","israel antiquities","paleo-leviticus","paleo leviticus","genesis apocryphon","isaiah scroll","psalms scroll","enoch","jubilees","community rule","war scroll","damascus document","temple scroll","hodayot","pesher","mmt","tefillin","phylactery","mezuzah","unprovenanced","provenance","forgery","forged","looted","smuggled","authentication","radiocarbon","ink analysis","repatriation","hobby lobby settlement","national stolen property","southwest radio","scott carroll","jerry pattengale","brill collection","southwestern baptist","liberty university","4q","11q","1q","testament","apocryphon","sectarian","schiffman","charlesworth","elgvin","justnes","rollston","tov"];

var DSS_SYSTEM_KNOWLEDGE="SPECIALIZED KNOWLEDGE - DEAD SEA SCROLLS:\n\nYou have expert knowledge of Dead Sea Scroll manuscripts. When letters mention the following, recognize them as DSS-related even without explicit mention:\n\nMANUSCRIPT NAMES: Paleo-Leviticus (4QpaleoLev), Genesis Apocryphon, Isaiah Scroll (1QIsa), Psalms Scroll (11QPsa), 1 Enoch (4QEn), Jubilees (4QJub), Community Rule (1QS), War Scroll (1QM), Damascus Document, Temple Scroll (11QT), Hodayot (1QH), Pesharim, Songs of the Sabbath Sacrifice, MMT (4QMMT), New Jerusalem, Visions of Amram, Aramaic Levi, 4Q542-548, Tefillin, Mezuzot\n\nKEY DEALERS: Kando family (Khalil Eskander Shahin, William Kando), anonymous Swiss/Norwegian dealers, Bethlehem/Jerusalem antiquities market\n\nKEY INSTITUTIONS (post-2002): Museum of the Bible (MOTB), Hobby Lobby, Green Collection, Azusa Pacific University, Southwestern Baptist Theological Seminary, Liberty University, Lanier Theological Library, Green Scholars Initiative\n\nKEY SCHOLARS: Emanuel Tov, Lawrence Schiffman, James Charlesworth, Torleif Elgvin, Kipp Davis, Arstein Justnes, Christopher Rollston, Michael Langlois, Craig Evans, Scott Carroll, Jerry Pattengale\n\nPROVENANCE: Most post-2002 fragments lack pre-2002 documentation. 16+ MOTB fragments proven as forgeries (2016-2020). Hobby Lobby paid $3M fine, returned artifacts to Iraq (2017-2018). The 2002 flood of new fragments is widely considered suspicious.\n\nCONTEXT: References to 'the fragments', 'the material', 'the scrolls', 'the texts' in negotiations with Kando, Ferrini, Schøyen, or other known dealers likely refer to DSS fragments.\n";

fetch(SUPABASE_URL+"/letters?select=id&limit=1",{headers:Object.assign({},SH,{"Prefer":"count=exact"})}).then(function(r){
  var ct=r.headers.get("content-range");
  if(ct){var m=ct.match(/\/(\d+)/);if(m)document.getElementById("letterCount").textContent=parseInt(m[1]).toLocaleString()+" letters in database";}
}).catch(function(){});

document.getElementById("questionInput").addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendQuestion();}
});

function isDSSQuery(q){
  var ql=q.toLowerCase();
  for(var i=0;i<DSS_TRIGGERS.length;i++){if(ql.indexOf(DSS_TRIGGERS[i])>=0)return true;}
  return false;
}

function addMessage(type,content){
  var chat=document.getElementById("chat");
  var div=document.createElement("div");
  div.className="message "+type;
  div.innerHTML=content;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

function showThinking(msg){
  var chat=document.getElementById("chat");
  var div=document.createElement("div");
  div.className="thinking";
  div.id="thinking";
  div.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="color:#666;font-size:13px;margin-left:8px">'+(msg||"Searching...")+'</span>';
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}
function hideThinking(){var t=document.getElementById("thinking");if(t)t.remove();}

function getSearchTerms(question){
  var q=question.toLowerCase();
  var terms=[];
  if(isDSSQuery(question)){terms=terms.concat(ALL_DSS_TERMS.slice(0,30));}
  var stopwords=["the","a","an","and","or","but","in","on","at","to","for","of","with","by","from","is","are","was","were","be","been","have","has","had","do","does","did","will","would","could","should","may","might","what","which","who","when","where","how","why","that","this","these","those","i","we","you","they","he","she","it","all","any","some","about","into","through","during","before","after","searching","internet","articles","websites","information","found","primary","sources","letters","faxes","court","documents","database","contradicts","challenges","scholarly","consensus","post"];
  var words=q.replace(/[^\w\s]/g," ").split(/\s+/).filter(function(w){return w.length>3&&stopwords.indexOf(w)===-1;});
  terms=terms.concat(words);
  return Array.from(new Set(terms)).slice(0,25);
}

async function searchDatabase(question){
  var terms=getSearchTerms(question);
  var allLetters=[];
  var seen=new Set();
  for(var i=0;i<Math.min(terms.length,20);i++){
    var kw=encodeURIComponent(terms[i]);
    try{
      var r1=await fetch(SUPABASE_URL+"/letters?select=id,author_id,recipient_id,date_of_letter,description,full_text,title&full_text=ilike.*"+kw+"*&limit=30",{headers:SH});
      var d1=await r1.json();
      if(Array.isArray(d1))d1.forEach(function(l){if(!seen.has(l.id)){seen.add(l.id);allLetters.push(l);}});
    }catch(e){}
    try{
      var r2=await fetch(SUPABASE_URL+"/letters?select=id,author_id,recipient_id,date_of_letter,description,full_text,title&description=ilike.*"+kw+"*&limit=15",{headers:SH});
      var d2=await r2.json();
      if(Array.isArray(d2))d2.forEach(function(l){if(!seen.has(l.id)){seen.add(l.id);allLetters.push(l);}});
    }catch(e){}
  }
  allLetters.sort(function(a,b){
    var aScore=0,bScore=0;
    var aText=((a.full_text||"")+(a.description||"")).toLowerCase();
    var bText=((b.full_text||"")+(b.description||"")).toLowerCase();
    terms.forEach(function(t){if(aText.indexOf(t)>=0)aScore++;if(bText.indexOf(t)>=0)bScore++;});
    return bScore-aScore;
  });
  return allLetters.slice(0,60);
}

async function loadPeopleNames(letters){
  var ids=new Set();
  letters.forEach(function(l){if(l.author_id)ids.add(l.author_id);if(l.recipient_id)ids.add(l.recipient_id);});
  if(ids.size===0)return{};
  var idList=Array.from(ids).join(",");
  try{
    var r=await fetch(SUPABASE_URL+"/people?id=in.("+idList+")&select=id,first_name,last_name",{headers:SH});
    var data=await r.json();
    var map={};
    if(Array.isArray(data))data.forEach(function(p){
      var l=(p.last_name||"").trim();
      var f=(p.first_name||"").trim();
      map[String(p.id)]=l&&f?l+", "+f:l||f||"Unknown";
    });
    return map;
  }catch(e){return{};}
}

function fdate(d){if(!d)return"unknown date";var p=d.split("-");if(p.length!==3)return d;return parseInt(p[1])+"/"+parseInt(p[2])+"/"+p[0];}

function getDisplayName(letter, names){
  var author=names[String(letter.author_id)]||"";
  var recip=names[String(letter.recipient_id)]||"";
  if(author&&recip)return author+" &#x2192; "+recip+" ("+fdate(letter.date_of_letter)+")";
  if(author)return author+" &#x2192; Unknown ("+fdate(letter.date_of_letter)+")";
  if(recip)return "Unknown &#x2192; "+recip+" ("+fdate(letter.date_of_letter)+")";
  // Fall back to title
  if(letter.title)return letter.title.substring(0,80)+(letter.title.length>80?"...":"");
  return "Untitled document";
}

function formatLetters(letters,names){
  return letters.map(function(l,i){
    var author=names[String(l.author_id)]||"Unknown";
    var recip=names[String(l.recipient_id)]||"Unknown";
    var date=fdate(l.date_of_letter);
    var text=l.full_text||(l.description?"[Description: "+l.description+"]":"[No text]");
    if(text.length>3000)text=text.substring(0,3000)+"...[truncated]";
    var header="=== LETTER "+(i+1)+" ===\nFrom: "+author+"\nTo: "+recip+"\nDate: "+date;
    if(l.title&&(author==="Unknown"||recip==="Unknown"))header+="\nDocument: "+l.title;
    return header+"\n\n"+text;
  }).join("\n\n");
}

async function askClaude(question,letters,names,useWeb){
  var dss=isDSSQuery(question);
  var sys="You are a research assistant specializing in papyri and biblical manuscript acquisition, trafficking, and provenance. You have access to private correspondence between dealers, scholars, collectors, and institutions.\n\nYour role:\n1. Analyze the primary source letters carefully\n2. Cross-reference with scholarly knowledge\n3. Identify contradictions or challenges to established narratives\n4. Cite specific letters by sender, recipient, and date\n5. Quote significant passages directly\n6. Be honest about uncertainty\n7. Think like a historian\n\n";
  if(dss)sys+=DSS_SYSTEM_KNOWLEDGE+"\nWhen analyzing for DSS connections, look for: references to 'fragments'/'material'/'texts' even without explicit DSS mention; negotiations with known DSS dealers; provenance discussions; price negotiations for biblical/Hebrew manuscripts; specific manuscript content matching known DSS texts.\n\n";
  var user="RESEARCH QUESTION:\n"+question+"\n\n";
  if(letters.length>0){
    user+="PRIMARY SOURCES ("+letters.length+" relevant documents from database):\n\n"+formatLetters(letters,names)+"\n\n";
    user+="Please provide a thorough research analysis. ";
  } else {
    user+="No matching documents found in database. Please provide analysis based on your knowledge.\n\n";
  }
  if(useWeb)user+="Draw on scholarly literature and public record for context. Identify tensions between private correspondence and public narrative.";
  var r=await fetch("/api/chat",{
    method:"POST",
    headers:{"content-type":"application/json"},
    body:JSON.stringify({"model":"claude-sonnet-4-5","max_tokens":4096,"system":sys,"messages":[{"role":"user","content":user}]})
  });
  var data=await r.json();
  if(data.content&&data.content[0])return data.content[0].text;
  if(data.error)return"Error: "+data.error.message;
  return"No response received.";
}

async function sendQuestion(){
  var input=document.getElementById("questionInput");
  var question=input.value.trim();
  if(!question)return;
  var useDB=document.getElementById("useDB").checked;
  var useWeb=document.getElementById("useWeb").checked;
  input.value="";
  document.getElementById("sendBtn").disabled=true;
  var dss=isDSSQuery(question);
  addMessage("user",question+(dss?' <span class="dss-badge">DSS Mode</span>':""));
  showThinking("Searching database"+(dss?" with DSS knowledge base":"")+"...");
  try{
    var letters=[],names={};
    if(useDB){
      letters=await searchDatabase(question);
      names=await loadPeopleNames(letters);
    }
    hideThinking();
    var statusMsg="Found <strong>"+letters.length+"</strong> relevant documents";
    if(dss)statusMsg+=" (DSS mode active)";
    statusMsg+=". Analyzing with Claude...";
    var statusDiv=addMessage("system",statusMsg);
    showThinking("Claude is reading and synthesizing...");
    var answer=await askClaude(question,letters,names,useWeb);
    hideThinking();
    statusDiv.remove();
    var formatted=answer
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/\n\n/g,"</p><p>").replace(/\n/g,"<br>")
      .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
      .replace(/\*(.+?)\*/g,"<em>$1</em>");
    formatted="<p>"+formatted+"</p>";
    var sourcesList="";
    if(letters.length>0){
      sourcesList='<div class="sources"><strong>Documents analyzed ('+letters.length+'):</strong>';
      letters.slice(0,15).forEach(function(l){
        var display=getDisplayName(l,names);
        var desc=l.description?' &mdash; '+l.description.substring(0,60):"";
        sourcesList+='<div class="source-item">'+display+desc+'</div>';
      });
      if(letters.length>15)sourcesList+='<div style="color:#888;font-size:11px;margin-top:4px">...and '+(letters.length-15)+' more</div>';
      sourcesList+='</div>';
    }
    addMessage("assistant","<h3>Research Analysis</h3>"+formatted+sourcesList);
  }catch(e){
    hideThinking();
    addMessage("assistant","Error: "+e.message);
  }
  document.getElementById("sendBtn").disabled=false;
}
</script>
</body>
</html>
