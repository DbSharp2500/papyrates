<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papyrates Research Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#1a1a2e;min-height:100vh;display:flex;flex-direction:column}
.header{background:#2d4a8a;color:white;padding:16px 24px;display:flex;align-items:center;gap:12px}
.header h1{font-size:20px;font-weight:500}
.header p{font-size:13px;opacity:0.8;margin-top:2px}
.chat-container{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;max-width:900px;width:100%;margin:0 auto}
.message{padding:16px;border-radius:10px;line-height:1.7;font-size:14px}
.message.user{background:#2d4a8a;color:white;align-self:flex-end;max-width:80%}
.message.assistant{background:white;color:#222;align-self:flex-start;max-width:90%;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.message.system{background:#1e3a5f;color:#aac4e8;align-self:center;font-size:12px;padding:8px 16px;border-radius:20px;text-align:center}
.message h3{color:#2d4a8a;margin-bottom:8px;font-size:15px}
.sources{margin-top:12px;padding-top:12px;border-top:1px solid #e0e0e0;font-size:12px;color:#666}
.source-item{background:#f0f3fa;padding:6px 10px;border-radius:4px;margin-top:6px}
.input-area{background:#16213e;padding:16px 24px;border-top:1px solid #2d4a8a}
.input-row{max-width:900px;margin:0 auto;display:flex;gap:12px;align-items:flex-end}
.input-row textarea{flex:1;padding:12px;border-radius:8px;border:1px solid #2d4a8a;background:#1a1a2e;color:white;font-size:14px;resize:none;min-height:60px;max-height:200px;font-family:Arial,sans-serif}
.input-row textarea::placeholder{color:#556}
.input-row textarea:focus{outline:none;border-color:#5a8ad4}
.send-btn{background:#2d4a8a;color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:14px;white-space:nowrap;height:48px}
.send-btn:hover{background:#3a5ba0}
.send-btn:disabled{opacity:0.5;cursor:default}
.thinking{display:flex;gap:6px;align-items:center;padding:16px;background:white;border-radius:10px;align-self:flex-start;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.dot{width:8px;height:8px;background:#2d4a8a;border-radius:50%;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.settings{background:#16213e;padding:8px 24px;border-bottom:1px solid #2d4a8a;display:flex;gap:16px;align-items:center;font-size:12px;color:#aaa;flex-wrap:wrap}
.settings label{display:flex;align-items:center;gap:6px;cursor:pointer}
.counter{margin-left:auto;color:#556}
.dss-badge{background:#4a1a6e;color:#d4a8ff;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:8px}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>🏴‍☠️ Papyrates Research Assistant</h1>
    <p>AI-powered analysis of the papyri correspondence database</p>
  </div>
</div>
<div class="settings">
  <label><input type="checkbox" id="useDB" checked> Search database letters</label>
  <label><input type="checkbox" id="useWeb" checked> Include scholarly context</label>
  <span id="letterCount" class="counter">Loading...</span>
</div>
<div class="chat-container" id="chat">
  <div class="message system">Ask a research question. I will search the correspondence database and synthesize an answer.<br>I have specialized knowledge of Dead Sea Scroll manuscripts, dealers, and provenance issues.</div>
</div>
<div class="input-area">
  <div class="input-row">
    <textarea id="questionInput" placeholder="Ask a research question... (e.g. 'What do the letters reveal about the acquisition of post-2002 Dead Sea Scroll fragments?')" rows="2"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendQuestion()">Ask</button>
  </div>
</div>

<script>
var SUPABASE_URL="https://vzfwobsnfqnnqvnsfksq.supabase.co/rest/v1";
var SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6ZndvYnNuZnFubnF2bnNma3NxIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Njg4ODA3MCwiZXhwIjoyMDkyNDY0MDcwfQ.J_TE4qWj9r6TIvGeptM58r2WtI6ytOe9zg7BBe29wHI";
var CLAUDE_KEY="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";
var SH={"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY};

// ============================================================
// DSS KNOWLEDGE BASE
// ============================================================
var DSS_TRIGGERS=["dead sea","dss","qumran","cave 4","cave 11","judean desert","wadi murabba","nahal hever","museum of the bible","motb","green collection","hobby lobby","post-2002","post 2002","unprovenanced","forgery","forgeries"];

var DSS_MANUSCRIPT_TERMS=["paleo-leviticus","paleo leviticus","4qpaleolev","genesis apocryphon","isaiah scroll","1qisa","psalms scroll","11qpsalms","1 enoch","enoch fragment","book of enoch","4qenoch","jubilees","community rule","1qs","serek hayahad","war scroll","1qm","damascus document","temple scroll","11qtemple","thanksgiving hymns","hodayot","1qh","pesher","pesharim","habakkuk commentary","songs of the sabbath sacrifice","shirot olat","mmt","4qmmt","halakhic letter","new jerusalem","phylactery","tefillin","mezuzah","paleo hebrew","aramaic levi","testament of levi","visions of amram","4q542","4q543","4q544","4q545","4q546","4q547","4q548"];

var DSS_DEALER_TERMS=["kando","william kando","khalil eskander","hagop skandar","swiss dealer","swiss collection","dead sea scrolls foundation","southwest radio","lanier","azusa pacific","brill collection","green scholars","scott carroll","jerry pattengale"];

var DSS_INSTITUTION_TERMS=["museum of the bible","hobby lobby","azusa pacific","southwestern baptist","liberty university","lanier","green collection","shrine of the book","rockefeller museum","ecole biblique","israel antiquities"];

var DSS_PROVENANCE_TERMS=["unprovenanced","no provenance","looted","illicit","smuggled","customs","forged","forgery","ink analysis","radiocarbon","c14","palaeography","authentication","repatriation","national stolen property","hobby lobby settlement","doj","department of justice","1970 convention","undeclared","misdeclared"];

var ALL_DSS_TERMS=[].concat(DSS_MANUSCRIPT_TERMS,DSS_DEALER_TERMS,DSS_INSTITUTION_TERMS,DSS_PROVENANCE_TERMS,["dead sea","scroll fragment","qumran","cave 4","cave 11","wadi","judean desert","israel antiquities authority","iaa","ketef jericho","nahal hever"]);

var DSS_SYSTEM_KNOWLEDGE="SPECIALIZED KNOWLEDGE - DEAD SEA SCROLLS:\n\nYou have expert knowledge of Dead Sea Scroll manuscripts. When letters mention the following, you should recognize them as DSS-related even if not explicitly stated:\n\nKEY MANUSCRIPT NAMES: Paleo-Leviticus (4QpaleoLev), Genesis Apocryphon (1QapGen), Isaiah Scroll (1QIsa), Psalms Scroll (11QPsa), 1 Enoch fragments (4QEn), Book of Jubilees (4QJub), Community Rule (1QS/Serek HaYahad), War Scroll (1QM), Damascus Document (CD), Temple Scroll (11QT), Thanksgiving Hymns/Hodayot (1QH), Pesharim commentaries, Songs of the Sabbath Sacrifice (ShirShab), MMT/Halakhic Letter (4QMMT), New Jerusalem text, Visions of Amram, Aramaic Levi Document, Testament of Levi, Various 4Q texts (4Q542-548), Tefillin/Phylacteries, Mezuzot fragments\n\nKEY DEALERS (Post-2002 market): Kando family (Khalil Eskander Shahin and son William Kando), various anonymous Swiss and Norwegian collectors/dealers, middlemen in Bethlehem and Jerusalem antiquities market\n\nKEY INSTITUTIONS that acquired post-2002 fragments: Museum of the Bible (MOTB/Green Collection/Hobby Lobby), Azusa Pacific University, Southwestern Baptist Theological Seminary, Liberty University, Lanier Theological Library, Green Scholars Initiative\n\nKEY SCHOLARS involved in post-2002 fragment authentication/controversy: Emanuel Tov, Lawrence Schiffman, James Charlesworth, Torleif Elgvin, Kipp Davis, Arstein Justnes, Christopher Rollston, Michael Langlois, Craig Evans, Scott Carroll, Jerry Pattengale\n\nPROVENANCE ISSUES: Most post-2002 fragments lack documented provenance before 2002. Many were later proven to be forgeries (16 MOTB fragments returned/identified as forgeries 2016-2020). The 2002 'flood' of new fragments is considered suspicious by most scholars. Hobby Lobby paid $3M fine and returned artifacts to Iraq in 2017-2018.\n\nCONTEXT: If a letter mentions 'the fragments', 'the material', 'the scrolls', 'the texts' in context of negotiations with Kando, Ferrini, Schøyen, or other known dealers in the post-2002 period, these likely refer to DSS fragments.\n";

// ============================================================

fetch(SUPABASE_URL+"/letters?select=id&limit=1",{headers:Object.assign({},SH,{"Prefer":"count=exact"})}).then(function(r){
  var ct=r.headers.get("content-range");
  if(ct){var m=ct.match(/\/(\d+)/);if(m)document.getElementById("letterCount").textContent=parseInt(m[1]).toLocaleString()+" letters in database";}
});

document.getElementById("questionInput").addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendQuestion();}
});

function isDSSQuery(question){
  var q=question.toLowerCase();
  for(var i=0;i<DSS_TRIGGERS.length;i++){if(q.indexOf(DSS_TRIGGERS[i])>=0)return true;}
  return false;
}

function addMessage(type,content){
  var chat=document.getElementById("chat");
  var div=document.createElement("div");
  div.className="message "+type;
  div.innerHTML=content;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

function showThinking(msg){
  var chat=document.getElementById("chat");
  var div=document.createElement("div");
  div.className="thinking";
  div.id="thinking";
  div.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="color:#666;font-size:13px;margin-left:8px">'+(msg||"Searching and analyzing...")+'</span>';
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function hideThinking(){var t=document.getElementById("thinking");if(t)t.remove();}

function getSearchTerms(question){
  var q=question.toLowerCase();
  var terms=[];
  var isDSS=isDSSQuery(question);

  if(isDSS){
    // Add all DSS-specific terms
    terms=terms.concat(ALL_DSS_TERMS.slice(0,15));
  }

  // Extract meaningful words from question
  var stopwords=["the","a","an","and","or","but","in","on","at","to","for","of","with","by","from","is","are","was","were","be","been","have","has","had","do","does","did","will","would","could","should","may","might","what","which","who","when","where","how","why","that","this","these","those","i","we","you","they","he","she","it","all","any","some","about","into","through","during","before","after","searching","internet","articles","websites","information","found","primary","sources","letters","faxes","court","documents","database","contradicts","challenges","scholarly","consensus","post"];
  var words=q.replace(/[^\w\s]/g," ").split(/\s+/).filter(function(w){return w.length>3&&stopwords.indexOf(w)===-1;});
  terms=terms.concat(words);
  return [...new Set(terms)].slice(0,20);
}

async function searchDatabase(question){
  var terms=getSearchTerms(question);
  var allLetters=[];
  var seen=new Set();

  for(var i=0;i<Math.min(terms.length,12);i++){
    var kw=encodeURIComponent(terms[i]);
    try{
      var r=await fetch(SUPABASE_URL+"/letters?select=id,author_id,recipient_id,date_of_letter,description,full_text&full_text=ilike.*"+kw+"*&limit=15",{headers:SH});
      var data=await r.json();
      if(Array.isArray(data)){data.forEach(function(l){if(!seen.has(l.id)){seen.add(l.id);allLetters.push(l);}});}
    }catch(e){}
    try{
      var r2=await fetch(SUPABASE_URL+"/letters?select=id,author_id,recipient_id,date_of_letter,description,full_text&description=ilike.*"+kw+"*&limit=8",{headers:SH});
      var data2=await r2.json();
      if(Array.isArray(data2)){data2.forEach(function(l){if(!seen.has(l.id)){seen.add(l.id);allLetters.push(l);}});}
    }catch(e){}
  }

  // Sort by relevance - letters with more term matches first
  allLetters.sort(function(a,b){
    var aScore=0,bScore=0;
    var aText=((a.full_text||"")+(a.description||"")).toLowerCase();
    var bText=((b.full_text||"")+(b.description||"")).toLowerCase();
    terms.forEach(function(t){
      if(aText.indexOf(t)>=0)aScore++;
      if(bText.indexOf(t)>=0)bScore++;
    });
    return bScore-aScore;
  });

  return allLetters.slice(0,35);
}

async function loadPeopleNames(letters){
  var ids=new Set();
  letters.forEach(function(l){if(l.author_id)ids.add(l.author_id);if(l.recipient_id)ids.add(l.recipient_id);});
  if(ids.size===0)return{};
  var r=await fetch(SUPABASE_URL+"/people?id=in.("+Array.from(ids).join(",")+")"+"&select=id,first_name,last_name",{headers:SH});
  var data=await r.json();
  var map={};
  if(Array.isArray(data))data.forEach(function(p){
    var l=(p.last_name||"").trim();var f=(p.first_name||"").trim();
    map[p.id]=l&&f?l+", "+f:l||f||"Unknown";
  });
  return map;
}

function fdate(d){if(!d)return"unknown date";var p=d.split("-");if(p.length!==3)return d;return parseInt(p[1])+"/"+parseInt(p[2])+"/"+p[0];}

function formatLetters(letters,names){
  return letters.map(function(l,i){
    var author=names[l.author_id]||"Unknown";
    var recip=names[l.recipient_id]||"Unknown";
    var date=fdate(l.date_of_letter);
    var text=l.full_text||(l.description?"[Description: "+l.description+"]":"[No text available]");
    if(text.length>3000)text=text.substring(0,3000)+"...[truncated]";
    return"=== LETTER "+(i+1)+" ===\nFrom: "+author+"\nTo: "+recip+"\nDate: "+date+"\n\n"+text;
  }).join("\n\n");
}

async function askClaude(question,letters,names,useWeb){
  var isDSS=isDSSQuery(question);
  
  var systemPrompt="You are a research assistant specializing in the history of papyri and biblical manuscript acquisition, trafficking, and provenance. You have access to a private database of correspondence between manuscript dealers, scholars, collectors, and institutions — letters, faxes, and emails that are not publicly available.\n\nYour role:\n1. Carefully analyze the primary source letters provided\n2. Cross-reference with scholarly knowledge and public record\n3. Identify contradictions, new information, or challenges to established narratives\n4. Always cite specific letters by sender, recipient, and date\n5. Quote relevant passages directly when they are significant\n6. Be honest about uncertainty — distinguish between what the letters clearly show vs what can be inferred\n7. Think like a historian — consider provenance, motivation, context, and what is NOT said\n\n";

  if(isDSS){
    systemPrompt+=DSS_SYSTEM_KNOWLEDGE+"\n\n";
    systemPrompt+="IMPORTANT: When analyzing these letters for DSS connections, look for:\n- References to 'fragments', 'material', 'texts' even without explicit DSS mention\n- Negotiations with known DSS dealers (Kando, Ferrini, etc.)\n- Discussions of provenance, authenticity, or origins of manuscripts\n- Price negotiations for biblical or Hebrew manuscripts\n- References to specific manuscript content that matches known DSS texts\n- Any information that contradicts or complicates the public record on post-2002 DSS fragments\n\n";
  }

  var userMessage="RESEARCH QUESTION:\n"+question+"\n\n";
  
  if(letters.length>0){
    userMessage+="PRIMARY SOURCES FROM DATABASE ("+letters.length+" relevant letters):\n\n"+formatLetters(letters,names)+"\n\n";
    userMessage+="Based on these primary sources and your knowledge, please provide a thorough research analysis. ";
  } else {
    userMessage+="Note: No directly matching letters were found in the database. Please provide analysis based on your knowledge, and note what types of primary sources would be most useful to find.\n\n";
  }

  if(useWeb){
    userMessage+="Please also draw on your knowledge of the scholarly literature, public record, and known history to provide context. Specifically identify any tensions or contradictions between the private correspondence and the public narrative.";
  }

  var r=await fetch("/api/chat",{
    method:"POST",
  headers:{"content-type":"application/json"},
    body:JSON.stringify({
      "model":"claude-sonnet-4-5",
      "max_tokens":4096,
      "system":systemPrompt,
      "messages":[{"role":"user","content":userMessage}]
    })
  });

  var data=await r.json();
  if(data.content&&data.content[0])return data.content[0].text;
  if(data.error)return"Error: "+data.error.message;
  return"No response received.";
}

async function sendQuestion(){
  var input=document.getElementById("questionInput");
  var question=input.value.trim();
  if(!question)return;
  var useDB=document.getElementById("useDB").checked;
  var useWeb=document.getElementById("useWeb").checked;
  input.value="";
  document.getElementById("sendBtn").disabled=true;

  var isDSS=isDSSQuery(question);
  var userMsg=question;
  if(isDSS)userMsg+=' <span class="dss-badge">DSS Mode</span>';
  addMessage("user",userMsg);
  showThinking("Searching database"+(isDSS?" with DSS knowledge base":"")+"...");

  try{
    var letters=[],names={};
    if(useDB){
      letters=await searchDatabase(question);
      names=await loadPeopleNames(letters);
    }

    hideThinking();

    var statusMsg="Found <strong>"+letters.length+"</strong> relevant letters";
    if(isDSS)statusMsg+=" (DSS knowledge base active — searching "+ALL_DSS_TERMS.slice(0,5).join(", ")+" and more)";
    statusMsg+=". Analyzing with Claude...";
    var statusDiv=addMessage("system",statusMsg);
    showThinking("Claude is reading the letters and synthesizing...");

    var answer=await askClaude(question,letters,names,useWeb);
    hideThinking();
    statusDiv.remove();

    var formatted=answer
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/\n\n/g,"</p><p>").replace(/\n/g,"<br>")
      .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
      .replace(/\*(.+?)\*/g,"<em>$1</em>");
    formatted="<p>"+formatted+"</p>";

    var sourcesList="";
    if(letters.length>0){
      sourcesList='<div class="sources"><strong>Letters analyzed ('+letters.length+'):</strong>';
      letters.slice(0,12).forEach(function(l){
        var author=names[l.author_id]||"Unknown";
        var recip=names[l.recipient_id]||"Unknown";
        sourcesList+='<div class="source-item">'+author+" &#x2192; "+recip+" ("+fdate(l.date_of_letter)+")"+(l.description?' — '+l.description.substring(0,70):"")+'</div>';
      });
      if(letters.length>12)sourcesList+='<div style="color:#888;font-size:11px;margin-top:4px">...and '+(letters.length-12)+' more</div>';
      sourcesList+='</div>';
    }

    addMessage("assistant","<h3>Research Analysis</h3>"+formatted+sourcesList);

  }catch(e){
    hideThinking();
    addMessage("assistant","Error: "+e.message);
  }
  document.getElementById("sendBtn").disabled=false;
}
</script>
</body>
</html>
